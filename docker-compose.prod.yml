services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bumpless
      POSTGRES_PASSWORD: bumpless
      POSTGRES_DB: bumpless
    volumes:
      - bumpless_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bumpless -d bumpless"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bumpless:bumpless@db:5432/bumpless
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data # persist the Let's Encrypt cert across deploys
    depends_on:
      - backend

volumes:
  bumpless_pgdata:
  caddy_data:
