name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: road-sentinel-hk/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r road-sentinel-hk/backend/requirements.txt

      - name: Check all modules import cleanly
        working-directory: road-sentinel-hk/backend
        run: |
          python -c "import main"
          python -c "from models.accelerometer import classify_road_event"
          python -c "from models.sound import classify_road_sound"
          python -c "from models.vision import analyse_frame"
          python -c "from models.fusion import fuse_signals"
          python -c "from services.clustering import ClusteringService"
          python -c "from services.dwd import get_current_weather"
          python -c "from services.geocoding import reverse_geocode"

  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: road-sentinel-hk/frontend/package-lock.json

      - name: Install dependencies
        working-directory: road-sentinel-hk/frontend
        run: npm ci

      - name: Build
        working-directory: road-sentinel-hk/frontend
        env:
          VITE_MAPBOX_TOKEN: pk.placeholder_for_ci_build
        run: npm run build

  docker:
    name: Docker — build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: road-sentinel-hk
        run: |
          docker build \
            --build-arg VITE_MAPBOX_TOKEN=pk.placeholder_for_ci_build \
            -t roadsense:ci .
